<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maj7 / m7 Chord Cycle Trainer</title>
<!-- NexusUI: the keyboard-display library -->
<script src="https://cdn.jsdelivr.net/npm/nexusui@2.1.6/dist/NexusUI.js"></script>
<!-- WebMidi.js: MIDI input -->
<script src="https://cdn.jsdelivr.net/npm/webmidi@3/dist/iife/webmidi.iife.js"></script>
<style>
  :root {
    --bg: #14161a;
    --panel: #1d2026;
    --fg: #f2f4f7;
    --muted: #8a93a2;
    --accent: #e8590c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 22px; padding: 24px;
  }
  .tabs { display: flex; gap: 8px; }
  .tabs button {
    background: var(--panel); color: var(--muted);
    border: 1px solid #2a2e36; border-radius: 999px;
    padding: 8px 18px; font-size: 14px; cursor: pointer;
    transition: all .15s ease;
  }
  .tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .card {
    background: var(--panel); border: 1px solid #2a2e36;
    border-radius: 18px; padding: 28px 32px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  .counter { color: var(--muted); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
  .chord-name { font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -.02em; transition: color .12s ease; }
  .chord-name.correct { color: #37b24d; }
  .chord-notes { font-size: 20px; color: var(--accent); font-weight: 600; letter-spacing: .12em; }
  #piano { margin-top: 6px; }
  .controls { display: flex; gap: 12px; align-items: center; }
  .controls button {
    background: #262a32; color: var(--fg);
    border: 1px solid #343a44; border-radius: 10px;
    padding: 10px 18px; font-size: 15px; cursor: pointer;
  }
  .controls button:hover { background: #2f343d; }
  .switch { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; color: var(--muted); font-size: 14px; }
  .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
  .switch .track {
    width: 44px; height: 24px; border-radius: 999px;
    background: #343a44; transition: background .18s ease; flex: none; position: relative;
  }
  .switch .thumb {
    position: absolute; top: 3px; left: 3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; transition: transform .18s ease;
  }
  .switch input:checked + .track { background: var(--accent); }
  .switch input:checked + .track .thumb { transform: translateX(20px); }
  .switch input:focus-visible + .track { box-shadow: 0 0 0 3px rgba(232,89,12,.4); }
  .hint { color: var(--muted); font-size: 13px; text-align: center; max-width: 560px; line-height: 1.5; }
  .midi { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .midi .dot { width: 9px; height: 9px; border-radius: 50%; background: #555; }
  .midi.on .dot { background: #37b24d; }
  .midi select {
    background: #262a32; color: var(--fg);
    border: 1px solid #343a44; border-radius: 8px;
    padding: 4px 8px; font-size: 13px; font-family: inherit; cursor: pointer;
  }
  kbd {
    background: #262a32; border: 1px solid #3a4049; border-bottom-width: 2px;
    border-radius: 6px; padding: 1px 7px; font-size: 12px; font-family: inherit; color: var(--fg);
  }
</style>
</head>
<body>

  <div class="tabs">
    <button data-cycle="maj7" class="active">maj7 cycle</button>
    <button data-cycle="m7">m7 cycle</button>
    <button data-cycle="all">both</button>
  </div>

  <div class="card">
    <div class="counter" id="counter">1 / 12</div>
    <div class="chord-name" id="name">Cmaj7</div>
    <div class="chord-notes" id="notes">C E G B</div>
    <div id="piano"></div>
  </div>

  <div class="controls">
    <button id="prev">← Prev</button>
    <button id="next">Next →</button>
    <button id="dir" title="Toggle direction of 'next'">↑ Ascending 4ths</button>
  </div>

  <label class="switch">
    <input type="checkbox" id="show-kb" checked />
    <span class="track"><span class="thumb"></span></span>
    <span class="switch-text">Show chord on keyboard</span>
  </label>

  <div class="midi" id="midi">
    <span class="dot"></span>
    <span id="midi-text">Looking for MIDI…</span>
    <select id="midi-select" style="display:none"></select>
  </div>

  <div class="hint">
    Play the highlighted chord on your MIDI keyboard (any octave/voicing) to advance automatically.<br />
    <kbd>Space</kbd> or <kbd>→</kbd> next chord &nbsp;·&nbsp; <kbd>←</kbd> previous &nbsp;·&nbsp;
    chords are shown in <strong>root position</strong> over two octaves from C.
  </div>

<script>
  // ----- Chord data -------------------------------------------------------
  // pc = pitch class of the root (C=0 ... B=11). Octave is fixed at 4 (C4=60).
  // Intervals are derived from quality so enharmonic spelling never matters.
  const INTERVALS = { maj7: [0, 4, 7, 11], m7: [0, 3, 7, 10] };

  const MAJ7 = [
    ["Cmaj7",  "C E G B",     0],
    ["Fmaj7",  "F A C E",     5],
    ["Bbmaj7", "Bb D F A",    10],
    ["Ebmaj7", "Eb G Bb D",   3],
    ["Abmaj7", "Ab C Eb G",   8],
    ["Dbmaj7", "Db F Ab C",   1],
    ["Gbmaj7", "Gb Bb Db F",  6],
    ["Bmaj7",  "B D# F# A#",  11],
    ["Emaj7",  "E G# B D#",   4],
    ["Amaj7",  "A C# E G#",   9],
    ["Dmaj7",  "D F# A C#",   2],
    ["Gmaj7",  "G B D F#",    7],
  ].map(([name, notes, pc]) => ({ name, notes, pc, q: "maj7" }));

  const M7 = [
    ["Cm7",  "C Eb G Bb",   0],
    ["Fm7",  "F Ab C Eb",   5],
    ["Bbm7", "Bb Db F Ab",  10],
    ["Ebm7", "Eb Gb Bb Db", 3],
    ["Abm7", "Ab Cb Eb Gb", 8],
    ["Dbm7", "Db Fb Ab Cb", 1],
    ["F#m7", "F# A C# E",    6],
    ["Bm7",  "B D F# A",     11],
    ["Em7",  "E G B D",      4],
    ["Am7",  "A C E G",      9],
    ["Dm7",  "D F A C",      2],
    ["Gm7",  "G Bb D F",     7],
  ].map(([name, notes, pc]) => ({ name, notes, pc, q: "m7" }));

  const CYCLES = { maj7: MAJ7, m7: M7, all: MAJ7.concat(M7) };

  // ----- State ------------------------------------------------------------
  const LOW  = 60;          // C4 — the fixed left-hand note, same for every chord
  const HIGH = LOW + 24;    // two full octaves up to C6 (inclusive)

  let list = CYCLES.maj7;
  let idx = 0;
  let piano = null;
  let active = [];          // currently highlighted MIDI notes

  const nameEl    = document.getElementById("name");
  const notesEl   = document.getElementById("notes");
  const counterEl = document.getElementById("counter");
  const pianoEl   = document.getElementById("piano");

  // Build the (fixed) two-octave keyboard once.
  if (typeof Nexus === "undefined") {
    pianoEl.textContent = "Could not load the keyboard library (check your internet connection).";
    pianoEl.style.color = "var(--muted)";
  } else {
    piano = new Nexus.Piano(pianoEl, {
      size: [780, 150],
      mode: "button",
      lowNote: LOW,
      highNote: HIGH,
    });
    piano.colorize("accent", getComputedStyle(document.documentElement)
                              .getPropertyValue("--accent").trim());
  }

  function render() {
    const c = list[idx];
    nameEl.textContent    = c.name;
    notesEl.textContent   = c.notes;
    counterEl.textContent = (idx + 1) + " / " + list.length;

    if (!piano) return;

    // Clear the previous chord, then light up this one in root position.
    active.forEach((k) => piano.toggleKey(k, false));
    const root = LOW + c.pc;                       // root in the first (C-based) octave
    active = INTERVALS[c.q].map((i) => root + i);  // root, 3rd/♭3rd, 5th, 7th
    active.forEach((k) => piano.toggleKey(k, true));
  }

  let dir = 1;   // +1 = ascending 4ths (list order), -1 = descending 5ths (reversed)
  function next() { idx = (idx + dir + list.length) % list.length; render(); }
  function prev() { idx = (idx - dir + list.length) % list.length; render(); }

  // ----- Wiring -----------------------------------------------------------
  document.getElementById("next").addEventListener("click", next);
  document.getElementById("prev").addEventListener("click", prev);

  const dirBtn = document.getElementById("dir");
  dirBtn.addEventListener("click", () => {
    dir = -dir;
    dirBtn.textContent = dir === 1 ? "↑ Ascending 4ths" : "↓ Descending 5ths";
  });

  document.getElementById("show-kb").addEventListener("change", (e) => {
    pianoEl.style.display = e.target.checked ? "" : "none";
  });

  document.querySelectorAll(".tabs button").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      list = CYCLES[btn.dataset.cycle];
      idx = 0;
      render();
    });
  });

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.key === "ArrowRight") { e.preventDefault(); next(); }
    else if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
  });

  // ----- MIDI input -------------------------------------------------------
  const midiEl     = document.getElementById("midi");
  const midiTextEl = document.getElementById("midi-text");
  const selectEl   = document.getElementById("midi-select");
  const held = new Set();   // pitch classes (0–11) currently held down

  selectEl.addEventListener("change", () => {
    listenTo(WebMidi.getInputById(selectEl.value));
    setMidiStatus(true, "Listening to");
  });

  function targetPcs() {
    const c = list[idx];
    return new Set(INTERVALS[c.q].map((i) => (c.pc + i) % 12));
  }

  // True when the held notes are exactly the chord's pitch classes — no more, no less.
  function isCorrect() {
    const target = targetPcs();
    if (held.size !== target.size) return false;
    for (const pc of target) if (!held.has(pc)) return false;
    return true;
  }

  function flashCorrect() {
    nameEl.classList.add("correct");
    setTimeout(() => nameEl.classList.remove("correct"), 220);
  }

  function onNoteOn(e)  {
    held.add(e.note.number % 12);
    if (isCorrect()) { flashCorrect(); next(); }
  }
  function onNoteOff(e) { held.delete(e.note.number % 12); }

  let currentInput = null;

  // Listen to exactly one input at a time; detach the previous one first.
  function listenTo(input) {
    if (currentInput) {
      currentInput.removeListener("noteon", onNoteOn);
      currentInput.removeListener("noteoff", onNoteOff);
    }
    held.clear();
    currentInput = input || null;
    if (currentInput) {
      currentInput.addListener("noteon", onNoteOn);
      currentInput.addListener("noteoff", onNoteOff);
    }
  }

  function setMidiStatus(on, text) {
    midiEl.classList.toggle("on", on);
    midiTextEl.textContent = text;
  }

  // Rebuild the device dropdown and keep listening to the chosen input.
  function refreshDevices() {
    const inputs = WebMidi.inputs;
    selectEl.innerHTML = "";

    if (!inputs.length) {
      selectEl.style.display = "none";
      listenTo(null);
      setMidiStatus(false, "Allowed, but no MIDI device found — plug one in, or use Space/arrows.");
      return;
    }

    inputs.forEach((inp) => {
      const opt = document.createElement("option");
      opt.value = inp.id;
      opt.textContent = inp.name;
      selectEl.appendChild(opt);
    });
    selectEl.style.display = "";

    // Keep the current pick if it's still around, otherwise default to the first.
    let chosen = currentInput && inputs.find((i) => i.id === currentInput.id);
    if (!chosen) chosen = inputs[0];
    selectEl.value = chosen.id;
    listenTo(chosen);
    setMidiStatus(true, "Listening to");
  }

  let settled = false;

  if (typeof WebMidi === "undefined") {
    setMidiStatus(false, "WebMidi library didn't load (CDN blocked?) — use Space/arrows.");
  } else if (!navigator.requestMIDIAccess) {
    setMidiStatus(false, "This browser/viewer has no Web MIDI support — open it in Chrome, Edge or Firefox. Space/arrows still work.");
  } else {
    setMidiStatus(false, "Enabling MIDI…");

    // If nothing has settled after a few seconds, the permission prompt is
    // probably still pending (or was dismissed) — tell the user instead of hanging.
    const watchdog = setTimeout(() => {
      if (!settled) setMidiStatus(false, "Still waiting on the MIDI permission prompt — look for it in the address bar. (Console has details.)");
    }, 4000);

    // Promise.resolve(...) guarantees a *synchronous* throw inside enable()
    // is turned into a catchable rejection rather than silently hanging.
    Promise.resolve()
      .then(() => WebMidi.enable())
      .then(() => {
        settled = true; clearTimeout(watchdog);
        refreshDevices();
        // Re-list whenever a device is plugged in or removed.
        WebMidi.addListener("connected",    (e) => { if (e.port.type === "input") refreshDevices(); });
        WebMidi.addListener("disconnected", (e) => { if (e.port.type === "input") refreshDevices(); });
      })
      .catch((err) => {
        settled = true; clearTimeout(watchdog);
        console.error("WebMidi enable failed:", err);
        const msg = err && err.message ? err.message : String(err);
        setMidiStatus(false, "MIDI error: " + msg + " — use Space/arrows.");
      });
  }

  render();
</script>
</body>
</html>
