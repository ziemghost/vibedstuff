<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vibedstuff</title>
  <style>
    .home { max-width: 820px; margin: 0 auto; padding: 64px 24px; }
    .home h1 { font-size: 40px; letter-spacing: -.02em; margin: 0 0 6px; }
    .home .sub { color: var(--muted); margin: 0 0 36px; font-size: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .app-card {
      display: block; text-decoration: none; color: var(--fg);
      background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 22px 22px 20px; transition: border-color .15s ease, transform .15s ease;
    }
    .app-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .app-card h2 { margin: 0 0 8px; font-size: 19px; }
    .app-card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="home">
    <h1>vibedstuff</h1>
    <p class="sub">A collection of small, single-purpose web toys.</p>
    <div class="grid" id="grid"></div>
  </main>
  <script type="module" src="/src/home/main.js"></script>
</body>
</html>
