<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vibedstuff</title>
  <style>
    .home { max-width: 720px; margin: 0 auto; padding: 64px 24px 48px; }
    .home h1 { font-size: 40px; letter-spacing: -.02em; margin: 0 0 28px; }
    .list { list-style: none; margin: 0; padding: 0; border-top: 1px solid var(--border); }
    .list li { border-bottom: 1px solid var(--border); }
    .list a {
      display: block; text-decoration: none; color: var(--fg);
      font-size: 20px; padding: 16px 4px; transition: color .12s ease, padding .12s ease;
    }
    .list a:hover { color: var(--accent); padding-left: 12px; }
  </style>
</head>
<body>
  <main class="home">
    <h1>vibedstuff</h1>
    <ul class="list" id="list"></ul>
  </main>
  <script type="module" src="/src/home/main.js"></script>
</body>
</html>
