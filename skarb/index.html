<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For My Skarb 💛</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { background: #b8e0f8; }
    body {
      margin: 0; padding: 0;
      background: #b8e0f8;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      position: relative;
      overflow-x: hidden;
    }

    /* Forest canvas background */
    #scene {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }

    /* Content on top */
    .ui {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 16px;
    }

    /* MapleStory-inspired panel */
    .ms-panel {
      width: min(480px, 96vw);
      background: #fffce0;
      border: 3px solid #d88818;
      border-radius: 14px;
      box-shadow: 0 5px 0 #a85f08, 0 8px 28px rgba(80,40,0,.22);
      padding: 24px 24px 18px;
      position: relative;
    }
    .ms-title {
      position: absolute; top: -15px; left: 16px;
      background: #d88818;
      color: #fff6e0;
      font-size: 8px;
      padding: 4px 14px;
      border-radius: 6px;
      box-shadow: 0 2px 0 #a85f08;
      white-space: nowrap;
    }
    .ms-text {
      font-size: clamp(7px, 1.9vw, 9px);
      color: #3a2208;
      line-height: 2.3;
      min-height: 5.5em;
    }
    .cur {
      display: inline-block; width: 8px; height: 10px;
      background: #d88818; vertical-align: middle; margin-left: 2px;
      animation: blink .6s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .ms-actions { display: flex; justify-content: flex-end; margin-top: 14px; }
    .ms-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px; padding: 10px 18px;
      background: #d88818; color: #fff;
      border: none; border-radius: 8px;
      box-shadow: 0 4px 0 #a85f08;
      cursor: pointer;
      position: relative; top: 0;
      transition: top .1s, box-shadow .1s;
    }
    .ms-btn:hover { background: #f0a030; }
    .ms-btn:active { top: 4px; box-shadow: none; }

    .back {
      position: fixed; top: 14px; left: 14px; z-index: 2;
      font-size: 7px; color: #4a6830;
      text-decoration: none;
      text-shadow: 0 1px 3px rgba(255,255,255,.9);
    }
    .back:hover { color: #1a3010; }

    .floater {
      position: fixed; pointer-events: none;
      font-size: 22px; z-index: 10;
      animation: floatup 1.6s ease-out forwards;
    }
    @keyframes floatup {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to   { transform: translateY(-110px) scale(.3); opacity: 0; }
    }
  </style>
</head>
<body>
<canvas id="scene"></canvas>
<a class="back" href="/vibedstuff/">← back</a>

<div class="ui">
  <div class="ms-panel">
    <span class="ms-title">✿ a message for you ✿</span>
    <div class="ms-text" id="dtext"></div>
    <div class="ms-actions">
      <button class="ms-btn" id="btn">▶ NEXT</button>
    </div>
  </div>
</div>

<script>
// ── Forest canvas scene ───────────────────────────────────────────
const cv = document.getElementById('scene');
const cx = cv.getContext('2d');

// Fox state — relative x (0..1), direction, leg phase
const foxes = [
  { rx: 0.12, dir: 1,  phase: 0 },
  { rx: 0.68, dir: -1, phase: Math.PI },
  { rx: 0.42, dir: 1,  phase: Math.PI * 0.7 },
];

function drawFox(x, y, phase, dir) {
  cx.save();
  try {
    cx.translate(x, y);
    cx.scale(dir, 1);

    const sw = Math.sin(phase) * 3;

    // Back legs
    cx.fillStyle = '#c05818';
    cx.fillRect(-13, -17, 4, 17 - sw);
    cx.fillRect( -8, -17, 4, 17 + sw);

    // Tail (arc-based, no bezier)
    cx.fillStyle = '#e07828';
    cx.beginPath();
    cx.arc(-20, -30, 11, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#f4e8d0';
    cx.beginPath();
    cx.arc(-20, -38, 5, 0, Math.PI * 2);
    cx.fill();

    // Body
    cx.fillStyle = '#e07828';
    cx.beginPath();
    cx.ellipse(0, -20, 16, 9, 0, 0, Math.PI * 2);
    cx.fill();

    // Belly
    cx.fillStyle = '#f4e8d0';
    cx.beginPath();
    cx.ellipse(2, -18, 9, 6, 0, 0, Math.PI * 2);
    cx.fill();

    // Front legs
    cx.fillStyle = '#c05818';
    cx.fillRect( 8, -17, 4, 17 + sw);
    cx.fillRect(13, -17, 4, 17 - sw);

    // Head
    cx.fillStyle = '#e07828';
    cx.beginPath();
    cx.arc(16, -26, 9, 0, Math.PI * 2);
    cx.fill();

    // Muzzle
    cx.fillStyle = '#f4e8d0';
    cx.beginPath();
    cx.ellipse(22, -23, 5, 4, 0, 0, Math.PI * 2);
    cx.fill();

    // Nose & eye
    cx.fillStyle = '#111';
    cx.beginPath(); cx.arc(26, -21, 1.5, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.arc(19, -29, 1.5, 0, Math.PI * 2); cx.fill();

    // Ears (triangles)
    cx.fillStyle = '#e07828';
    cx.beginPath(); cx.moveTo(10,-31); cx.lineTo(7,-41); cx.lineTo(16,-32); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(17,-30); cx.lineTo(14,-40); cx.lineTo(22,-31); cx.closePath(); cx.fill();
    cx.fillStyle = '#e87888';
    cx.beginPath(); cx.moveTo(10,-32); cx.lineTo(9,-38); cx.lineTo(15,-33); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(17,-31); cx.lineTo(15,-37); cx.lineTo(21,-32); cx.closePath(); cx.fill();
  } finally {
    cx.restore();  // always restore, even if something throws
  }
}

function resize() {
  cv.width  = Math.ceil(window.innerWidth);
  cv.height = Math.ceil(window.innerHeight);
  draw();
}

function draw() {
  const W = cv.width, H = cv.height;
  const ground = H * 0.68;

  // Sky gradient
  const sky = cx.createLinearGradient(0, 0, 0, ground);
  sky.addColorStop(0, '#88c8f0');
  sky.addColorStop(1, '#c8ecd0');
  cx.fillStyle = sky;
  cx.fillRect(0, 0, W, ground);

  // Clouds
  drawCloud(W * 0.12, H * 0.10, 70);
  drawCloud(W * 0.45, H * 0.07, 90);
  drawCloud(W * 0.78, H * 0.13, 55);

  // Mountains (behind trees)
  drawMountains(W, ground);

  // Far trees (darker, smaller)
  [0.08, 0.17, 0.26, 0.68, 0.78, 0.86, 0.94].forEach(p =>
    drawTree(W * p, ground, H * 0.20, '#2a6020', '#388030', '#48a840')
  );

  // Ground layers
  cx.fillStyle = '#5ab840';
  cx.fillRect(0, ground, W, H * 0.10);
  cx.fillStyle = '#4a9830';
  cx.fillRect(0, ground + H * 0.10, W, H * 0.90);

  // Ground highlight strip
  cx.fillStyle = '#70d050';
  cx.fillRect(0, ground, W, 4);

  // Grass tufts
  for (let i = 0; i < Math.ceil(W / 18); i++) {
    drawGrassTuft(i * 18 + 6, ground + 4);
  }

  // Flowers
  const flowerColors = ['#ff88aa','#ffcc44','#dd88ff','#88ccff','#ff9944'];
  for (let i = 0; i < 18; i++) {
    drawFlower(W * (0.03 + i * 0.055), ground + 14, flowerColors[i % flowerColors.length]);
  }

  // Mushrooms (vary sizes, fixed positions by ratio)
  drawMushroom(W * 0.30, ground, 34);
  drawMushroom(W * 0.36, ground, 22);
  drawMushroom(W * 0.53, ground, 28);
  drawMushroom(W * 0.60, ground, 18);
  drawMushroom(W * 0.43, ground, 14);

  // Butterflies
  drawButterfly(W * 0.35, H * 0.48);
  drawButterfly(W * 0.60, H * 0.52);

  // Foxes
  foxes.forEach(f => drawFox(f.rx * W, ground, f.phase, f.dir));
}

function drawMountains(W, ground) {
  // Far mountains (lighter, bluer)
  cx.fillStyle = '#a8b8d8';
  const far = [
    [0.05, 0.52], [0.18, 0.38], [0.32, 0.48], [0.44, 0.30],
    [0.58, 0.42], [0.70, 0.35], [0.82, 0.45], [0.95, 0.40],
  ];
  cx.beginPath();
  cx.moveTo(0, ground);
  far.forEach(([rx, rh], i) => {
    const x = rx * W, y = ground - rh * ground;
    const prev = far[i - 1];
    if (i === 0) { cx.lineTo(x, y); return; }
    const px = prev[0] * W, py = ground - prev[1] * ground;
    const mx = (px + x) / 2, my = (py + y) / 2;
    cx.quadraticCurveTo(px, py, mx, my);
  });
  const last = far[far.length - 1];
  cx.lineTo(last[0] * W, ground - last[1] * ground);
  cx.lineTo(W, ground); cx.closePath(); cx.fill();

  // Near mountains (darker, greener — closer range)
  cx.fillStyle = '#7a9870';
  const near = [
    [0.0, 0.40], [0.10, 0.28], [0.22, 0.38], [0.35, 0.22],
    [0.50, 0.34], [0.63, 0.20], [0.76, 0.32], [0.88, 0.24], [1.0, 0.36],
  ];
  cx.beginPath();
  cx.moveTo(0, ground);
  near.forEach(([rx, rh], i) => {
    const x = rx * W, y = ground - rh * ground;
    const prev = near[i - 1];
    if (i === 0) { cx.lineTo(x, y); return; }
    const px = prev[0] * W, py = ground - prev[1] * ground;
    const mx = (px + x) / 2, my = (py + y) / 2;
    cx.quadraticCurveTo(px, py, mx, my);
  });
  cx.lineTo(W, ground); cx.closePath(); cx.fill();

  // Snow caps on the tallest far peaks
  cx.fillStyle = 'rgba(255,255,255,0.85)';
  [[0.18, 0.38], [0.44, 0.30], [0.70, 0.35]].forEach(([rx, rh]) => {
    const px = rx * W, py = ground - rh * ground;
    cx.beginPath();
    cx.moveTo(px, py);
    cx.lineTo(px - W * 0.025, py + ground * 0.06);
    cx.lineTo(px + W * 0.025, py + ground * 0.06);
    cx.closePath(); cx.fill();
  });
}

function drawCloud(x, y, r) {
  cx.fillStyle = 'rgba(255,255,255,0.88)';
  [[0,0,r],[r*0.55,-r*0.18,r*0.7],[r*-0.5,-r*0.1,r*0.65]].forEach(([dx,dy,rr]) => {
    cx.beginPath();
    cx.ellipse(x+dx, y+dy, rr*0.8, rr*0.5, 0, 0, Math.PI*2);
    cx.fill();
  });
}

function drawTree(x, y, h, c1, c2, c3) {
  const w = h * 0.5;
  cx.fillStyle = '#6b4226';
  cx.fillRect(x - w*0.12, y - h*0.32, w*0.24, h*0.32);
  [[c1,1.0,0.42],[c2,0.78,0.48],[c3,0.56,0.55]].forEach(([c,yf,wf]) => {
    cx.fillStyle = c;
    cx.beginPath();
    cx.moveTo(x, y - h * yf);
    cx.lineTo(x - w * wf, y - h * (yf - 0.28));
    cx.lineTo(x + w * wf, y - h * (yf - 0.28));
    cx.closePath();
    cx.fill();
  });
}

function drawGrassTuft(x, y) {
  cx.strokeStyle = '#3a8828';
  cx.lineWidth = 1.5;
  [[-3,0],[0,-4],[3,0]].forEach(([dx,dy]) => {
    cx.beginPath();
    cx.moveTo(x, y); cx.lineTo(x+dx, y+dy-4);
    cx.stroke();
  });
}

function drawFlower(x, y, color) {
  cx.fillStyle = color;
  [[-3,0],[3,0],[0,-3],[0,3]].forEach(([dx,dy]) => {
    cx.beginPath(); cx.ellipse(x+dx, y+dy, 3, 2, 0, 0, Math.PI*2); cx.fill();
  });
  cx.fillStyle = '#ffee55';
  cx.beginPath(); cx.arc(x, y, 2.2, 0, Math.PI*2); cx.fill();
}

function drawMushroom(x, y, s) {
  // Stalk
  cx.fillStyle = '#e8d8a8'; cx.fillRect(x-s*0.24, y-s*0.72, s*0.48, s*0.72);
  cx.fillStyle = '#c8b880'; cx.fillRect(x-s*0.24, y-s*0.72, s*0.12, s*0.72);
  // Cap shadow
  cx.fillStyle = '#b81818';
  cx.beginPath(); cx.ellipse(x+s*0.04, y-s*0.70, s*0.68, s*0.52, 0, Math.PI, 0); cx.fill();
  // Cap main
  cx.fillStyle = '#e82828';
  cx.beginPath(); cx.ellipse(x, y-s*0.72, s*0.68, s*0.52, 0, Math.PI, 0); cx.fill();
  // White spots
  cx.fillStyle = 'rgba(255,255,255,0.92)';
  [[0,-0.46],[-.34,-0.30],[.36,-0.28],[0.04,-0.20]].forEach(([dx,dy]) => {
    cx.beginPath(); cx.arc(x+dx*s, y+dy*s, s*0.11, 0, Math.PI*2); cx.fill();
  });
  // Stalk gills
  cx.fillStyle = '#f0e8c0';
  cx.beginPath(); cx.ellipse(x, y-s*0.72, s*0.7, s*0.12, 0, 0, Math.PI); cx.fill();
}

function drawButterfly(x, y) {
  const t = Date.now() * 0.003;
  const flap = Math.sin(t + x) * 0.3 + 0.7;
  cx.fillStyle = 'rgba(220,150,255,0.7)';
  cx.beginPath();
  cx.ellipse(x - 8*flap, y, 8*flap, 5, -0.4, 0, Math.PI*2); cx.fill();
  cx.beginPath();
  cx.ellipse(x + 8*flap, y, 8*flap, 5, 0.4, 0, Math.PI*2); cx.fill();
  cx.fillStyle = '#333';
  cx.beginPath(); cx.ellipse(x, y, 1.5, 5, 0, 0, Math.PI*2); cx.fill();
}

// Animate butterflies
function animate() {
  // Just redraw the butterfly layer cheaply by re-drawing full scene
  // but that's expensive — instead draw butterflies on top each frame
  const W = cv.width, H = cv.height;
  // Clear just the butterfly area by re-drawing the sky bg there
  // Actually: redraw full scene at low rate + butterflies every frame
  requestAnimationFrame(animate);
}

// Animate scene at ~30fps
let lastDraw = 0;
function loop(ts) {
  try {
    if (ts - lastDraw > 33) {
      const W = cv.width;
      foxes.forEach(f => {
        f.rx += f.dir * (1.4 / W);
        f.phase += 0.14;
        if (f.rx > 1.12) f.rx = -0.12;
        if (f.rx < -0.12) f.rx = 1.12;
      });
      draw();
      lastDraw = ts;
    }
  } catch(e) { /* keep looping on error */ }
  requestAnimationFrame(loop);
}
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(loop);

// ── Compliments ───────────────────────────────────────────────────
const LINES = [
  "You make every ordinary\nmoment feel like something\nworth remembering.",
  "Your kindness is the quiet\nkind — the kind that\nactually sticks.",
  "The world genuinely got\nbetter the day you showed\nup in it.",
  "You have a gift for making\npeople feel completely\nat home.",
  "Your laugh is one of my\nfavourite sounds in the\nwhole world.",
  "You notice the little things,\nand that means more\nthan you know.",
  "Being around you is its\nown kind of comfort.",
  "You're brilliant — and you\nnever make a big deal of it.",
  "You make the boring stuff\nfeel like a little adventure.",
  "I'm so glad you exist,\nand I mean that completely.",
  "Every day with you is a\nsmall gift I don't take\nfor granted.",
  "You bring warmth into every\nroom you walk into,\nwithout even trying.",
  "You're exactly who you are —\nand that's more\nthan enough.",
  "You always know what to say,\neven when words are hard.",
  "Your care for others is so\nreal it's almost unfair\nto everyone else.",
];

let lastIdx = -1, ticker = null, pos = 0, cur = '';
const textEl = document.getElementById('dtext');
const btn = document.getElementById('btn');

function pick() {
  let i; do { i = Math.floor(Math.random() * LINES.length); } while (i === lastIdx);
  lastIdx = i; return LINES[i];
}

function startType(str) {
  clearInterval(ticker); pos = 0; cur = str;
  textEl.innerHTML = '<span class="cur"></span>';
  ticker = setInterval(() => {
    pos++;
    const slice = cur.slice(0, pos).replace(/\n/g, '<br>');
    textEl.innerHTML = pos < cur.length ? slice + '<span class="cur"></span>' : slice;
    if (pos >= cur.length) { clearInterval(ticker); ticker = null; }
  }, 42);
}

btn.addEventListener('click', () => {
  if (ticker) {
    clearInterval(ticker); ticker = null; pos = cur.length;
    textEl.innerHTML = cur.replace(/\n/g, '<br>');
  } else {
    ['🌸','✨','🍄','💛','🌿'].forEach((e, i) => {
      const f = document.createElement('span');
      f.className = 'floater'; f.textContent = e;
      f.style.left = (10 + Math.random() * 80) + 'vw';
      f.style.bottom = '28vh';
      f.style.animationDelay = (i * 0.1) + 's';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 1800);
    });
    startType(pick());
  }
});

startType(pick());
</script>
</body>
</html>
